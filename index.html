<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WATCH VIDEO</title>

<!-- FONT MODERN -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  font-family: 'Poppins', sans-serif;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;

  background: linear-gradient(135deg, #ff6ec4, #7873f5);

  padding:15px;
}
.container{
  width:100%;
  max-width:360px;

  background:rgba(255,255,255,0.12);
  padding:30px 22px;
  border-radius:18px;

  text-align:center;
  backdrop-filter: blur(12px);
  border:1px solid rgba(255,255,255,0.2);

  box-shadow:0 15px 40px rgba(0,0,0,0.25);
}
.download-btn{
  display:block;
  width:100%;
  padding:16px;
  margin:15px 0;
  text-decoration:none;

  font-size:16px;
  font-weight:700;
  letter-spacing:1.5px;
  text-transform:uppercase;

  color:#fff;

  background: linear-gradient(135deg, #ff6ec4, #ff9a9e);

  border-radius:12px;
  position:relative;
  overflow:hidden;

  transition:all .3s ease;
  text-shadow:
    0 2px 6px rgba(0,0,0,0.3),
    0 0 6px rgba(255,255,255,0.4),
    0 0 12px rgba(255,110,196,0.5);
}
.download-btn:hover{
  transform:translateY(-3px);
  box-shadow:0 0 30px rgba(255,110,196,0.6);
}
.download-btn:active{
  transform:scale(0.96);
}
.download-btn::before{
  content:"";
  position:absolute;
  top:0;
  left:-100%;
  width:100%;
  height:100%;

  background:linear-gradient(
    120deg,
    transparent,
    rgba(255,255,255,.7),
    transparent
  );

  animation:shine 2.5s infinite;
}
.arrow-left,
.arrow-right{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  font-size:18px;
  opacity:.8;

  animation:arrow 1.2s infinite ease-in-out;
}

.arrow-left{
  left:15px;
}

.arrow-right{
  right:15px;
  animation-delay:.6s;
}
@keyframes shine{
  0%{left:-100%;}
  100%{left:100%;}
}

@keyframes arrow{
  0%{
    opacity:.3;
    transform:translateY(-50%) scale(.8);
  }
  50%{
    opacity:1;
    transform:translateY(-50%) scale(1.3);
  }
  100%{
    opacity:.3;
    transform:translateY(-50%) scale(.8);
  }
}
@media(max-width:480px){

  .container{
    padding:25px 18px;
  }

  .download-btn{
    font-size:14px;
    padding:14px;
  }

}

</style>
</head>

<body>

<div class="container">

  <a href="https://vids-content-viewer.pages.dev/?v=xNYK3o0S1" class="download-btn">

    <span class="arrow-left">▶</span>

    WATCH FULL VIDEO

    <span class="arrow-right">◀</span>

  </a>

</div>

</body>
</html>
